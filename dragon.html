<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tail-Only Golden Dragon Cursor</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111; /* dark background */
    touch-action: none;
}
svg {
    position: absolute;
    width: 100%;
    height: 100%;
    cursor: none;
    pointer-events: none;
    background: transparent;
}
path {
    filter: drop-shadow(0 0 10px #FFD700);
}
</style>
</head>
<body>

<svg>
<defs>
    <!-- Golden gradient -->
    <linearGradient id="warmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFD700">
            <animate attributeName="stop-color" values="#FFD700;#FFA500;#FFD700" dur="2s" repeatCount="indefinite"/>
        </stop>
        <stop offset="100%" stop-color="#FFA500">
            <animate attributeName="stop-color" values="#FFA500;#FF8C00;#FFA500" dur="2s" repeatCount="indefinite"/>
        </stop>
    </linearGradient>

    <!-- Dragon Head -->
    <g id="Cabeza">
        <path style="fill:url(#warmGradient)" d="M-28.9,-1.1L-28.55 -1.95Q-28.1 -3.1 -27.25 -2.95L-26.7 -2.95Q-27.7 -1.65 -28.9 -1.1M-18.35,-1.8Q-15.1 -10.3 -9.6 -6.05Q-15.1 -6.2 -18.35 -1.8M-18.35,1.1Q-15.1 5.45 -9.6 5.35Q-15.1 9.55 -18.35 1.1M-26.7,2.2L-27.25 2.25Q-28.1 2.4 -28.55 1.2L-28.9 0.35Q-27.7 0.9 -26.7 2.2"/>
    </g>

    <!-- Spine / Tail -->
    <g id="Espina">
        <path style="fill:url(#warmGradient)" d="M-18.8,0Q-17.85 -5.7 -12.3 -9.6Q-11.2 -5.35 -6.5 -8.25L-6.45 -8.2L-6.2 -8.3Q1.25 -16.25 6.65 -12.4Q0.05 -12.55 0 -5.95Q2.7 -2.4 7.75 -4.1Q18 -1.45 18.8 0L-18.8 0"/>
    </g>
</defs>

<g id="screen"></g>
</svg>

<script>
"use strict";

const screen = document.getElementById("screen");
const xmlns = "http://www.w3.org/2000/svg";
const xlinkns = "http://www.w3.org/1999/xlink";

let width = window.innerWidth;
let height = window.innerHeight;
const N = 50; // more segments for long tail
const elems = [];
const pointer = { x: width/2, y: height/2 };
let rad = 0;
let frm = Math.random();

window.addEventListener("resize", ()=>{ width = window.innerWidth; height = window.innerHeight; });
window.addEventListener("pointermove", (e)=>{ pointer.x=e.clientX; pointer.y=e.clientY; rad=0; });

const prepend = (use, i)=>{
    const elem = document.createElementNS(xmlns,"use");
    elems[i].use = elem;
    elem.setAttributeNS(xlinkns,"xlink:href","#"+use);
    screen.prepend(elem);
};

// initialize elements
for(let i=0;i<N;i++) elems[i]={use:null,x:width/2,y:height/2};

// Head first, then spine segments for tail
for(let i=1;i<N;i++){
    if(i===1) prepend("Cabeza", i);
    else prepend("Espina", i);
}

const radm = Math.min(width,height)/4;

const run = ()=>{
    requestAnimationFrame(run);
    let e = elems[0];

    const ax = (Math.cos(3*frm)*rad*width)/height;
    const ay = (Math.sin(4*frm)*rad*height)/width;
    e.x += (ax + pointer.x - e.x)/10;
    e.y += (ay + pointer.y - e.y)/10;

    for(let i=1;i<elems.length;i++){
        let e = elems[i];
        let ep = elems[i-1];
        const a = Math.atan2(e.y-ep.y,e.x-ep.x);
        const spacing = ((100-i)/5)*0.5;
        e.x += (ep.x-e.x+Math.cos(a)*spacing)/4;
        e.y += (ep.y-e.y+Math.sin(a)*spacing)/4;
        const s = ((162 + 4*(1-i))/50)*0.5;
        e.use.setAttributeNS(null,"transform",
            `translate(${(ep.x+e.x)/2},${(ep.y+e.y)/2}) rotate(${(180/Math.PI)*a}) scale(${s},${s})`
        );
    }

    if(rad < radm) rad++;
    frm += 0.003;

    if(rad>60){
        pointer.x += (width/2 - pointer.x)*0.05;
        pointer.y += (height/2 - pointer.y)*0.05;
    }
};

run();
</script>

</body>
</html>
